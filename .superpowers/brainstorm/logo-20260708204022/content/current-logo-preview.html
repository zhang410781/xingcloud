<style>
  .preview-wrap { max-width: 1080px; margin: 0 auto; }
  .preview-grid { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 18px; align-items: stretch; }
  .preview-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .hero-preview {
    min-height: 440px;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, #f8fbff 0%, #ecf8fc 52%, #f8fafc 100%);
    padding: 32px;
  }
  .hero-preview img { width: min(360px, 82vw); height: auto; border-radius: 10px; }
  .side { display: grid; gap: 14px; }
  .sample { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
  .label { margin-bottom: 12px; }
  .sidebar-box {
    width: 92px; height: 176px; border-radius: 16px; background: #0f172a;
    display: flex; align-items: flex-start; justify-content: center; padding-top: 20px;
  }
  .sidebar-box img { width: 48px; height: 48px; border-radius: 8px; }
  .wordmark {
    display: flex; align-items: center; gap: 14px;
    min-height: 92px; border: 1px solid rgba(203,213,225,.9); border-radius: 14px; padding: 16px;
    background: rgba(255,255,255,.9);
  }
  .wordmark img { width: 62px; height: 62px; border-radius: 10px; flex: 0 0 auto; }
  .wordmark strong { display: block; color: #0f172a; font-size: 19px; line-height: 1.2; }
  .wordmark span { display: block; margin-top: 4px; color: #64748b; font-size: 12px; }
  .favicon-row { display: flex; align-items: center; gap: 12px; }
  .favicon-box { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #dbeafe; display: grid; place-items: center; background: #e2f6fc; }
  .favicon-box img { width: 28px; height: 28px; border-radius: 6px; }
  @media (max-width: 900px) { .preview-grid { grid-template-columns: 1fr; } }
</style>

<section class="preview-wrap">
  <h2>当前 Logo 预览</h2>
  <p class="subtitle">这是按你的最新图片裁剪后的弱光版：中心光芒已缩小，右下角水印未带入。</p>

  <div class="preview-grid">
    <article class="preview-card">
      <div class="hero-preview">
        <img src="/files/brand-mark-current.png" alt="XingCloud Logo preview" />
      </div>
    </article>

    <aside class="side">
      <div class="sample">
        <div class="label">Sidebar</div>
        <div class="sidebar-box">
          <img src="/files/brand-mark-current.png" alt="Sidebar Logo" />
        </div>
      </div>
      <div class="sample">
        <div class="label">Login / Wordmark</div>
        <div class="wordmark">
          <img src="/files/brand-mark-current.png" alt="Login Logo" />
          <div>
            <strong>Xing-Cloud</strong>
            <span>AI Agent · 智能运维平台</span>
          </div>
        </div>
      </div>
      <div class="sample">
        <div class="label">Favicon 32px</div>
        <div class="favicon-row">
          <div class="favicon-box">
            <img src="/files/brand-mark-current.png" alt="Favicon Logo" />
          </div>
          <span style="color:#64748b;font-size:13px;">小尺寸效果</span>
        </div>
      </div>
    </aside>
  </div>
</section>
