<style>
  .preview-wrap { max-width: 1120px; margin: 0 auto; }
  .preview-grid { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 18px; align-items: stretch; }
  .preview-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(15, 52, 96, .12);
  }
  .hero-preview {
    min-height: 430px;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 72% 20%, rgba(91, 192, 235, .12), transparent 34%),
      linear-gradient(135deg, #f8fafc 0%, rgba(91, 192, 235, .08) 50%, rgba(46, 134, 222, .05) 100%);
    padding: 32px;
  }
  .hero-preview img { width: min(340px, 82vw); height: auto; }
  .side { display: grid; gap: 14px; }
  .sample {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 4px 12px rgba(15, 52, 96, .08);
  }
  .label { margin-bottom: 12px; color: #64748b; }
  .sidebar-box {
    width: 92px; height: 176px; border-radius: 14px; background: #0f3460;
    display: flex; align-items: flex-start; justify-content: center; padding-top: 20px;
  }
  .sidebar-box img { width: 48px; height: 48px; }
  .wordmark {
    display: flex; align-items: center; gap: 14px;
    min-height: 92px; border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px;
    background: rgba(248,250,252,.9);
  }
  .wordmark img { width: 62px; height: 62px; flex: 0 0 auto; }
  .wordmark strong { display: block; color: #0f3460; font-size: 20px; line-height: 1.2; letter-spacing: -.3px; }
  .wordmark span { display: block; margin-top: 4px; color: #64748b; font-size: 12px; }
  .favicon-row { display: flex; align-items: center; gap: 12px; }
  .favicon-box { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e2e8f0; display: grid; place-items: center; background: #f8fafc; }
  .favicon-box img { width: 28px; height: 28px; }
  @media (max-width: 900px) { .preview-grid { grid-template-columns: 1fr; } }
</style>

<section class="preview-wrap">
  <h2>星云 UI 风格 Logo 预览</h2>
  <p class="subtitle">已改为组件库同款矢量星云轨道 Logo：#5BC0EB → #2E86DE 渐变、深空墨蓝搭配、无位图背景和中心过曝。</p>

  <div class="preview-grid">
    <article class="preview-card">
      <div class="hero-preview">
        <img src="/files/nebula-brand-mark.svg" alt="XingCloud Nebula Logo preview" />
      </div>
    </article>

    <aside class="side">
      <div class="sample">
        <div class="label">Sidebar</div>
        <div class="sidebar-box">
          <img src="/files/nebula-brand-mark.svg" alt="Sidebar Logo" />
        </div>
      </div>
      <div class="sample">
        <div class="label">Login / Wordmark</div>
        <div class="wordmark">
          <img src="/files/nebula-brand-mark.svg" alt="Login Logo" />
          <div>
            <strong>Xing-Cloud</strong>
            <span>AI Agent · 智能运维平台</span>
          </div>
        </div>
      </div>
      <div class="sample">
        <div class="label">Favicon 32px</div>
        <div class="favicon-row">
          <div class="favicon-box">
            <img src="/files/nebula-brand-mark.svg" alt="Favicon Logo" />
          </div>
          <span style="color:#64748b;font-size:13px;">小尺寸矢量预览</span>
        </div>
      </div>
    </aside>
  </div>
</section>
